name: Build SAMP 64-bit APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Bu s…ôtir biz…ô manual olaraq d√ľym…ôy…ô basńĪb build etm…ôk icaz…ôsi verir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fix Case-Sensitivity Mismatches
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          def fix_case_insensitive_includes(base_dir):
              # Kod daxilind…ôki include s…ôtirl…ôrini tapmaq √ľ√ß√ľn regex
              inc_pattern = re.compile(r'#\s*include\s*["<]([^">]+)[">]')
              
              # Diskd…ôki m√∂vcud fayllarńĪn ki√ßik h…ôrfl…ô x…ôrit…ôsini √ßńĪxarńĪrńĪq
              file_map = {}
              for root, dirs, files in os.walk(base_dir):
                  for f in files:
                      fp = os.path.join(root, f)
                      file_map[fp.lower()] = fp

              # B√ľt√ľn m…ônb…ô fayllarńĪnńĪ yoxlayńĪrńĪq
              for root, dirs, files in os.walk(base_dir):
                  for file in files:
                      if file.endswith(('.cpp', '.h', '.hpp', '.c', '.cc')):
                          file_path = os.path.join(root, file)
                          try:
                              with open(file_path, 'r', encoding='utf-8', errors='ignore') as f:
                                  content = f.read()
                          except:
                              continue
                          
                          includes = inc_pattern.findall(content)
                          current_dir = Path(root)
                          
                          for inc in includes:
                              inc_clean = inc.strip()
                              inc_path = Path(inc_clean)
                              
                              # Kodun axtardńĪńüńĪ x…ôyali yol
                              requested_target = current_dir / inc_path
                              
                              # H…ômin yolu ki√ßik h…ôrfl…ôrl…ô real fayllar arasńĪnda axtarńĪrńĪq
                              real_path = file_map.get(str(requested_target).lower())
                              
                              # ∆Źg…ôr birbaŇüa tapńĪlmasa, qlobal olaraq sonluńüuna g√∂r…ô axtarńĪrńĪq
                              if not real_path:
                                  suffix = str(inc_path).lower()
                                  for low_path, actual_path in file_map.items():
                                      if low_path.endswith(suffix):
                                          real_path = actual_path
                                          break
                              
                              # ∆Źg…ôr fayl varsa amma adńĪ f…ôrqlidirs…ô (m…ôs. playerTabList.h vs playertablist.h)
                              if real_path and not os.path.exists(str(requested_target)):
                                  os.makedirs(os.path.dirname(str(requested_target)), exist_ok=True)
                                  try:
                                      rel_target = os.path.relpath(real_path, os.path.dirname(str(requested_target)))
                                      os.symlink(rel_target, str(requested_target))
                                      print(f"Symlink yaradildi: {requested_target} -> {rel_target}")
                                  except FileExistsError:
                                      pass
                                  except Exception as e:
                                      print(f"Xeta bas verdi: {e}")

          # C++ kodlarńĪnńĪn olduńüu …ôsas qovluńüu skan edirik
          fix_case_insensitive_includes('app/src/main/cpp')

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-64bit-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
