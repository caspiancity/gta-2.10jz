name: Build SAMP 64-bit APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Bu sətir bizə manual olaraq düyməyə basıb build etmək icazəsi verir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Auto-Correct Include Case Mismatches in Source Code
        shell: python
        run: |
          import os
          import re

          def rewrite_includes_with_correct_casing(base_dir):
              # Skan edilməyəcək qovluqlar
              skip_dirs = {'.git', '.github', '.gradle', 'build', 'app/build'}
              
              # 1. Repodakı bütün real faylları mütləq yolları ilə (kiçik hərflərlə açar olaraq) indeksləyirik
              abs_file_map = {}
              print("1. Diskdeki real fayllar skan edilir...")
              for root, dirs, files in os.walk(base_dir):
                  if any(skip in root for skip in skip_dirs):
                      continue
                  for f in files:
                      if f.endswith(('.h', '.hpp', '.c', '.cpp', '.cc')):
                          abs_path = os.path.abspath(os.path.join(root, f))
                          # Əgər əvvəlki səhv addımlardan qalan symlink varsa, onu silirik
                          if os.path.islink(abs_path):
                              try:
                                  os.unlink(abs_path)
                              except:
                                  pass
                              continue
                          abs_file_map[abs_path.lower()] = abs_path

              # İki dırnaq arasındakı include-ları hədəf alan regex: #include "path/to/header.h"
              inc_pattern = re.compile(r'(#\s*include\s*")([^"]+)(")')
              
              print("2. Kod daxilindeki include sətirləri analiz və bərpa edilir...")
              for root, dirs, files in os.walk(base_dir):
                  if any(skip in root for skip in skip_dirs):
                      continue
                  for file in files:
                      if file.endswith(('.cpp', '.h', '.hpp', '.c', '.cc')):
                          file_path = os.path.abspath(os.path.join(root, file))
                          try:
                              with open(file_path, 'r', encoding='utf-8', errors='ignore') as f:
                                  content = f.read()
                          except:
                              continue
                          
                          modified = False
                          
                          def replacer(match):
                              nonlocal modified
                              prefix = match.group(1)      # #include "
                              inc_path_str = match.group(2)  # məsələn, ../vendor/RakNet/BitStream.h
                              suffix = match.group(3)      # "
                              
                              # Cari faylın yerləşdiyi qovluq
                              current_file_dir = os.path.dirname(file_path)
                              
                              # 1. İlk olaraq include yolunu cari qovluğa nəzərən yoxlayırıq
                              target_abs_path = os.path.abspath(os.path.join(current_file_dir, inc_path_str))
                              target_key = target_abs_path.lower()
                              
                              if target_key in abs_file_map:
                                  real_target_abs = abs_file_map[target_key]
                                  # Real faylın cari fayla nəzərən nisbi yolunu hesablayırıq
                                  real_rel_path = os.path.relpath(real_target_abs, current_file_dir)
                                  # C++ standartına uyğun olaraq slash-ləri tənzimləyirik
                                  real_rel_path = real_rel_path.replace('\\', '/')
                                  
                                  if real_rel_path != inc_path_str:
                                      print(f"[REWRITE] {os.path.basename(file_path)}: \"{inc_path_str}\" -> \"{real_rel_path}\"")
                                      modified = True
                                      return f"{prefix}{real_rel_path}{suffix}"
                                  return match.group(0)
                              
                              # 2. Əgər nisbi olaraq tapılmasa, layihənin əsas daxiletmə (include) qovluqlarına nəzərən yoxlayırıq
                              include_bases = [
                                  os.path.abspath('app/src/main/cpp'),
                                  os.path.abspath('app/src/main/cpp/samp'),
                                  os.path.abspath('app/src/main/cpp/samp/vendor')
                              ]
                              for base in include_bases:
                                  if os.path.exists(base):
                                      target_abs_path = os.path.abspath(os.path.join(base, inc_path_str))
                                      target_key = target_abs_path.lower()
                                      if target_key in abs_file_map:
                                          real_target_abs = abs_file_map[target_key]
                                          real_rel_path = os.path.relpath(real_target_abs, base)
                                          real_rel_path = real_rel_path.replace('\\', '/')
                                          if real_rel_path != inc_path_str:
                                              print(f"[REWRITE-BASE] {os.path.basename(file_path)}: \"{inc_path_str}\" -> \"{real_rel_path}\"")
                                              modified = True
                                              return f"{prefix}{real_rel_path}{suffix}"
                                          break
                              
                              return match.group(0)
                          
                          new_content = inc_pattern.sub(replacer, content)
                          if modified:
                              try:
                                  with open(file_path, 'w', encoding='utf-8') as f:
                                      f.write(new_content)
                              except Exception as e:
                                  print(f"Yazilma xetasi {file_path}: {e}")

          rewrite_includes_with_correct_casing('.')

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-64bit-Debug-APK
          path: app/build/outputs/apk/debug/*.apk