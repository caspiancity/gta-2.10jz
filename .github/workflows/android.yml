name: Build SAMP 64-bit APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Bu sətir bizə manual olaraq düyməyə basıb build etmək icazəsi verir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fix Case-Sensitivity and Prevent Duplicate Compilation
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          def resolve_case_mismatches_safely(base_dir):
              # include "header.h" sətirlərini tapmaq üçün
              inc_pattern = re.compile(r'#\s*include\s*"([^"]+)"')
              
              # Layihədəki bütün real faylların xəritəsi: { 'fayl_adi.h': '/tam/yol/fayl_adi.h' }
              # Qovluqları deyil, yalnız real faylları qeyd edirik ki, dublikat qovluq yaranmasın!
              file_map = {}
              skip_dirs = {'.git', '.github', '.gradle', 'build', 'app/build'}
              
              print("1. Diskdeki real fayllar skan edilir...")
              for root, dirs, files in os.walk(base_dir):
                  if any(skip in root for skip in skip_dirs):
                      continue
                  for f in files:
                      if f.endswith(('.h', '.hpp', '.c', '.cpp', '.cc')):
                          file_path = os.path.abspath(os.path.join(root, f))
                          # Əgər bu bir symlink-dirsə, indeksləmə və sil (köhnə buildlərdən qalan xətalı keçidlər)
                          if os.path.islink(file_path):
                              try:
                                  os.unlink(file_path)
                              except:
                                  pass
                              continue
                          
                          # Kiçik hərflərlə fayl adı -> real yol
                          file_map[f.lower()] = file_path

              # Həmçinin köhnə xətalı symlink qovluqlarını silirik
              print("2. Kohne xetali qovluq simlinkleri temizlenir...")
              for root, dirs, files in os.walk(base_dir):
                  if any(skip in root for skip in skip_dirs):
                      continue
                  for d in dirs:
                      dir_path = os.path.join(root, d)
                      if os.path.islink(dir_path):
                          try:
                              os.unlink(dir_path)
                              print(f"[TEMIZLENDI] Simlink qovlugu silindi: {dir_path}")
                          except:
                              pass

              print("3. Boyuk-kicik herf ferqleri yalniz fayl seviyyesinde hell edilir...")
              # İndi bütün kodları analiz edirik
              for root, dirs, files in os.walk(base_dir):
                  if any(skip in root for skip in skip_dirs):
                      continue
                  for file in files:
                      if file.endswith(('.cpp', '.h', '.hpp', '.c', '.cc')):
                          file_path = os.path.join(root, file)
                          try:
                              with open(file_path, 'r', encoding='utf-8', errors='ignore') as f:
                                  content = f.read()
                          except:
                              continue
                          
                          includes = inc_pattern.findall(content)
                          current_dir_abs = os.path.abspath(root)
                          
                          for inc in includes:
                              inc_clean = inc.strip()
                              if not inc_clean:
                                  continue
                              
                              # Include edilən faylın təmiz adı (məs. "BitStream.h" və ya "playerTabList.h")
                              inc_basename = os.path.basename(inc_clean)
                              low_inc_basename = inc_basename.lower()
                              
                              # Əgər bu adda real fayl repomuzda mövcuddursa
                              if low_inc_basename in file_map:
                                  real_file_path = file_map[low_inc_basename]
                                  real_basename = os.path.basename(real_file_path)
                                  
                                  # Əgər adlar fərqlidirsə (məs. playertablist.h vs playerTabList.h)
                                  if real_basename != inc_basename:
                                      # Simlinki cari faylın axtarış edə biləcəyi qovluqda yaradırıq
                                      target_link = os.path.join(current_dir_abs, inc_basename)
                                      
                                      # Əgər artıq belə bir fayl/link yoxdursa, simlink yaradaq
                                      if not os.path.exists(target_link):
                                          try:
                                              # Nisbi yol tapırıq ki, symlink düzgün işləsin
                                              rel_target = os.path.relpath(real_file_path, current_dir_abs)
                                              os.symlink(rel_target, target_link)
                                              print(f"[DUZELDIS] Simlink yaradildi: {target_link} -> {rel_target}")
                                          except Exception as e:
                                              pass

          resolve_case_mismatches_safely('.')

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-64bit-Debug-APK
          path: app/build/outputs/apk/debug/*.apk