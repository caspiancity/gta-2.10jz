name: Build SAMP 64-bit APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Bu sətir bizə manual olaraq düyməyə basıb build etmək icazəsi verir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fix Case-Sensitivity Mismatches Safely
        shell: python
        run: |
          import os
          import re

          def fix_case_mismatches(base_dir):
              # Yalniz dirnaq icindeki include-lari axtaririq ("..."). < > olan sistem fayllarina toxunmuruq.
              inc_pattern = re.compile(r'#\s*include\s*"([^"]+)"')
              
              # Diskdeki fayllarin adlarini saxlayan luget: { 'kicik_ad.h': ['tam/yol/kicik_ad.h', ... ] }
              basename_map = {}
              skip_dirs = {'.git', '.github', '.gradle', 'build', 'app/build'}
              
              print("1. Diskdeki C/C++ fayllari skan edilir...")
              for root, dirs, files in os.walk(base_dir):
                  if any(skip in root for skip in skip_dirs):
                      continue
                  for f in files:
                      if f.endswith(('.h', '.hpp', '.c', '.cpp', '.cc')):
                          lower_f = f.lower()
                          if lower_f not in basename_map:
                              basename_map[lower_f] = []
                          basename_map[lower_f].append(os.path.join(root, f))
                          
              print("2. Boyuk-kicik herf ferqleri hell edilir...")
              for root, dirs, files in os.walk(base_dir):
                  if any(skip in root for skip in skip_dirs):
                      continue
                  for file in files:
                      if file.endswith(('.cpp', '.h', '.hpp', '.c', '.cc')):
                          file_path = os.path.join(root, file)
                          try:
                              with open(file_path, 'r', encoding='utf-8', errors='ignore') as f:
                                  content = f.read()
                          except:
                              continue
                              
                          for inc in inc_pattern.findall(content):
                              inc_clean = inc.strip()
                              if not inc_clean: continue
                              
                              # Yalniz faylin esas adini cixaririq (mes. "playerTabList.h")
                              inc_basename = os.path.basename(inc_clean)
                              low_inc_basename = inc_basename.lower()
                              
                              # Eger axtarilan fayl repoda movcuddursa
                              if low_inc_basename in basename_map:
                                  for real_path in basename_map[low_inc_basename]:
                                      real_dir = os.path.dirname(real_path)
                                      real_basename = os.path.basename(real_path)
                                      
                                      # Eger kodda axtarilan adla diskdeki ad boyuk-kicik herfe gore ferqlenirse
                                      # Esl faylin oldugu qovluqda yeni bir symlink yaradiriq
                                      if real_basename != inc_basename:
                                          target_link = os.path.join(real_dir, inc_basename)
                                          if not os.path.exists(target_link):
                                              try:
                                                  os.symlink(real_basename, target_link)
                                                  print(f"[DUZELDIS] {target_link} -> {real_basename}")
                                              except Exception as e:
                                                  pass

          fix_case_mismatches('.')

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-64bit-Debug-APK
          path: app/build/outputs/apk/debug/*.apk